<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo V&V - Analizador de Reportes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .bg-vyv-red { background-color: #991B1B; }
        .text-vyv-red { color: #991B1B; }
        .border-vyv-red { border-color: #991B1B; }
        .focus-vyv-red:focus { border-color: #991B1B; --tw-ring-color: #991B1B; }
        
        .bubble-agent { background-color: #d9fdd3; border-top-right-radius: 0; }
        .bubble-customer { background-color: #ffffff; border-top-left-radius: 0; }
        .bubble-system { background-color: #e2e8f0; color: #64748b; font-size: 0.75rem; }
        .bubble-file { background-color: #f1f5f9; border-left: 4px solid #94a3b8; color: #475569; font-style: italic; }
        
        #modal-chat-body::-webkit-scrollbar { width: 6px; }
        #modal-chat-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full border border-slate-200 flex items-center justify-center bg-white overflow-hidden shadow-inner">
                    <span class="text-vyv-red font-bold text-lg">V&V</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight">Grupo V&V</h1>
                    <p class="text-xs font-medium text-slate-500">Analizador de reportes de chat de WhatsApp</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="exportCSV()" class="px-4 py-2 bg-slate-800 text-white rounded-lg text-sm hover:bg-slate-900 transition-colors"><i class="fa-solid fa-file-csv mr-2"></i>Exportar CSV</button>
                <div class="h-4 w-px bg-slate-300"></div>
                <div class="text-sm text-slate-600 bg-slate-100 px-4 py-2 rounded-lg border border-slate-200">
                    <span class="font-semibold text-slate-700">Supervisora:</span> Giovanna Bravo
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8 space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="p-3 rounded-lg bg-red-50 text-vyv-red text-2xl"><i class="fa-solid fa-comments"></i></div>
                <div>
                    <p class="text-sm font-medium text-slate-500">Total Chats Archivados</p>
                    <p class="text-2xl font-bold text-slate-900" id="kpi-total">0</p>
                </div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="p-3 rounded-lg bg-blue-50 text-blue-600 text-2xl"><i class="fa-solid fa-clock"></i></div>
                <div>
                    <p class="text-sm font-medium text-slate-500">Duración Promedio</p>
                    <p class="text-2xl font-bold text-slate-900" id="kpi-duration">0 min</p>
                </div>
            </div>
            <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                <div class="p-3 rounded-lg bg-green-50 text-green-600 text-2xl"><i class="fa-solid fa-user-shield"></i></div>
                <div>
                    <p class="text-sm font-medium text-slate-500">Cola Activa</p>
                    <p class="text-base font-bold text-slate-900 truncate max-w-[180px]">Sup. Giovanna Bravo</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="p-4 border-b border-slate-200 bg-slate-50 flex flex-col sm:flex-row gap-3 justify-between items-center">
                <div class="flex gap-2 w-full sm:w-auto">
                    <input type="text" id="search-input" placeholder="Buscar número..." class="w-full sm:w-56 px-4 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus-vyv-red">
                    <input type="date" id="date-input" class="px-4 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus-vyv-red">
                </div>
                <button id="btn-refresh" class="w-full sm:w-auto px-4 py-2 bg-vyv-red hover:bg-red-900 text-white font-medium rounded-lg text-sm transition-colors flex items-center justify-center gap-2 shadow-sm cursor-pointer">
                    <i class="fa-solid fa-rotate"></i> Actualizar
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-slate-100 border-b border-slate-200 text-slate-600 font-semibold">
                            <th class="p-4">ID Sesión</th>
                            <th class="p-4">Cliente (WhatsApp)</th>
                            <th class="p-4">Agente Atención</th>
                            <th class="p-4">Inicio del Chat</th>
                            <th class="p-4">Cierre del Chat</th>
                            <th class="p-4 text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="chats-table-body" class="divide-y divide-slate-100">
                        <tr id="empty-row"><td colspan="6" class="p-8 text-center text-slate-400">Cargando datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="chat-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white rounded-xl shadow-2xl border border-slate-200 w-full max-w-2xl h-[550px] flex flex-col overflow-hidden">
            <div class="p-4 bg-vyv-red text-white flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-full bg-white/20 flex items-center justify-center text-lg"><i class="fa-brands fa-whatsapp"></i></div>
                    <div>
                        <h3 id="modal-client-name" class="font-bold text-base leading-tight">Historial</h3>
                        <p id="modal-agent-name" class="text-xs text-red-200"></p>
                    </div>
                </div>
                <button id="btn-close-modal" class="text-white hover:text-red-200 text-xl cursor-pointer p-1"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="modal-chat-body" class="flex-1 bg-[#efeae2] p-4 overflow-y-auto space-y-3" style="background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');">
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://vyv-wa.ursus006.workers.dev';
        const btnRefresh = document.getElementById('btn-refresh');
        const tableBody = document.getElementById('chats-table-body');
        const searchInput = document.getElementById('search-input');
        const dateInput = document.getElementById('date-input');
        const chatModal = document.getElementById('chat-modal');
        const btnCloseModal = document.getElementById('btn-close-modal');
        const modalChatBody = document.getElementById('modal-chat-body');

        let allChats = [];

        document.addEventListener('DOMContentLoaded', () => {
            fetchChatsFromWorker();
            btnRefresh.addEventListener('click', fetchChatsFromWorker);
            btnCloseModal.addEventListener('click', () => chatModal.classList.add('hidden'));
            searchInput.addEventListener('input', applyFilters);
            dateInput.addEventListener('change', applyFilters);
        });

        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase();
            const dateTerm = dateInput.value;
            const filtered = allChats.filter(chat => {
                const matchNumber = chat.customer_phone.toLowerCase().includes(searchTerm);
                const chatDate = chat.start_time ? chat.start_time.split('T')[0] : '';
                const matchDate = dateTerm ? chatDate === dateTerm : true;
                return matchNumber && matchDate;
            });
            loadTable(filtered);
        }

        function loadTable(data) {
            tableBody.innerHTML = '';
            if (!data || data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-slate-400">No se encontraron resultados.</td></tr>`;
                document.getElementById('kpi-total').innerText = '0';
                return;
            }
            document.getElementById('kpi-total').innerText = data.length;
            data.forEach(chat => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 border-b border-slate-100 transition-colors";
                tr.innerHTML = `
                    <td class="p-4 font-mono text-xs text-slate-500 font-bold">${chat.chat_id.substring(0,8)}</td>
                    <td class="p-4"><div class="font-semibold text-slate-900">${chat.customer_phone}</div><div class="text-xs text-slate-400">${chat.customer_name || 'Sin nombre'}</div></td>
                    <td class="p-4 text-slate-800 font-medium">${chat.agent_name || 'N/A'}</td>
                    <td class="p-4 text-xs text-slate-600">${new Date(chat.start_time).toLocaleString()}</td>
                    <td class="p-4 text-xs text-slate-600">${chat.end_time ? new Date(chat.end_time).toLocaleString() : 'N/A'}</td>
                    <td class="p-4 text-center"><button onclick="openChatViewer('${chat.chat_id}')" class="px-3 py-1.5 bg-slate-100 hover:bg-vyv-red hover:text-white text-slate-700 font-medium rounded-md text-xs cursor-pointer"><i class="fa-solid fa-eye"></i> Ver</button></td>
                `;
                tableBody.appendChild(tr);
            });
        }

        async function fetchChatsFromWorker() {
            btnRefresh.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i>`;
            try {
                const res = await fetch(`${WORKER_URL}/api/chats`);
                allChats = await res.json();
                applyFilters();
            } catch (err) { alert("Error al cargar datos."); }
            finally { btnRefresh.innerHTML = `<i class="fa-solid fa-rotate"></i> Actualizar`; }
        }

        function exportCSV() {
            let csv = "ID,Cliente,Agente,Inicio,Fin\n" + allChats.map(c => `${c.chat_id},${c.customer_phone},${c.agent_name},${c.start_time},${c.end_time}`).join("\n");
            const a = document.createElement('a');
            a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
            a.download = 'reporte_vyv.csv';
            a.click();
        }

        window.openChatViewer = function(chatId) {
            const chat = allChats.find(c => c.chat_id === chatId);
            if (!chat) return;
            document.getElementById('modal-client-name').innerText = `Cliente: ${chat.customer_name || chat.customer_phone}`;
            document.getElementById('modal-agent-name').innerText = `Atendido por: ${chat.agent_name}`;
            modalChatBody.innerHTML = '';
            try {
                const messages = JSON.parse(chat.transcript);
                messages.forEach(msg => {
                    const bubble = document.createElement('div');
                    const isAgent = msg.type === 'agent';
                    const isSystem = msg.type === 'system';
                    const isFile = msg.text.toLowerCase().includes('file') || msg.text.toLowerCase().includes('sticker');
                    bubble.className = `flex w-full ${isAgent ? 'justify-end' : (isSystem ? 'justify-center' : 'justify-start')}`;
                    bubble.innerHTML = `
                        <div class="max-w-[75%] p-3 rounded-lg shadow-xs text-sm ${isAgent ? 'bubble-agent' : (isSystem ? 'bubble-system' : (isFile ? 'bubble-file' : 'bubble-customer'))}">
                            ${!isSystem ? `<div class="text-[10px] font-bold text-slate-500 mb-1">${msg.person}</div>` : ''}
                            <p class="leading-normal break-words">${isFile ? '<i class="fa-solid fa-paperclip mr-2"></i>' : ''}${msg.text}</p>
                        </div>
                    `;
                    modalChatBody.appendChild(bubble);
                });
            } catch(e) { modalChatBody.innerHTML = `<p>Error al cargar historial.</p>`; }
            chatModal.classList.remove('hidden');
        }
    </script>
</body>
</html>
