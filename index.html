<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo V&V - Analizador de Reportes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .bg-vyv-red { background-color: #991B1B; }
        .text-vyv-red { color: #991B1B; }
        .border-vyv-red { border-color: #991B1B; }
        .focus-vyv-red:focus { border-color: #991B1B; --tw-ring-color: #991B1B; }
        .bubble-agent { background-color: #d9fdd3; border-top-right-radius: 0; }
        .bubble-customer { background-color: #ffffff; border-top-left-radius: 0; }
        .bubble-file { background-color: #f1f5f9; border-left: 4px solid #94a3b8; font-size: 0.85rem; color: #475569; }
        #modal-chat-body::-webkit-scrollbar { width: 6px; }
        #modal-chat-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold text-slate-900 tracking-tight">Grupo V&V</h1>
            <div class="flex gap-3">
                <button onclick="exportCSV()" class="px-4 py-2 bg-slate-800 text-white rounded-lg text-sm hover:bg-slate-900"><i class="fa-solid fa-file-csv mr-2"></i>Exportar CSV</button>
                <button id="btn-refresh" class="px-4 py-2 bg-vyv-red text-white rounded-lg text-sm hover:bg-red-900"><i class="fa-solid fa-rotate mr-2"></i>Actualizar</button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-6 space-y-6">
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="p-4 border-b border-slate-200"><input type="text" id="search-input" placeholder="Buscar por número..." class="w-full sm:w-72 px-4 py-2 border rounded-lg text-sm"></div>
            <table class="w-full text-left text-sm">
                <thead><tr class="bg-slate-100 text-slate-600 font-semibold"><th class="p-4">Edo</th><th class="p-4">ID</th><th class="p-4">Cliente</th><th class="p-4">Agente</th><th class="p-4">Fecha</th><th class="p-4 text-center">Acción</th></tr></thead>
                <tbody id="chats-table-body" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </main>

    <div id="chat-modal" class="fixed inset-0 bg-slate-900/40 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl h-[550px] flex flex-col overflow-hidden">
            <div class="p-4 bg-vyv-red text-white flex justify-between"><h3 class="font-bold">Historial</h3><button onclick="document.getElementById('chat-modal').classList.add('hidden')"><i class="fa-solid fa-xmark"></i></button></div>
            <div id="modal-chat-body" class="flex-1 bg-[#efeae2] p-4 overflow-y-auto space-y-3"></div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://vyv-wa.ursus006.workers.dev';
        let allChats = [];

        async function fetchChats() {
            const btn = document.getElementById('btn-refresh');
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i>`;
            const res = await fetch(`${WORKER_URL}/api/chats`);
            allChats = await res.json();
            renderTable(allChats);
            btn.innerHTML = `<i class="fa-solid fa-rotate"></i> Actualizar`;
        }

        function renderTable(data) {
            const tbody = document.getElementById('chats-table-body');
            tbody.innerHTML = '';
            data.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="p-4"><i class="fa-solid fa-circle ${c.agent_name && c.agent_name !== 'Desconocido' ? 'text-green-500' : 'text-gray-300'}"></i></td><td class="p-4 font-mono">${c.chat_id.substring(0,8)}</td><td class="p-4 font-semibold">${c.customer_phone}</td><td class="p-4">${c.agent_name || 'Pendiente'}</td><td class="p-4">${new Date(c.start_time).toLocaleDateString()}</td><td class="p-4 text-center"><button onclick="openChatViewer('${c.chat_id}')" class="text-vyv-red font-bold">Ver Chat</button></td>`;
                tbody.appendChild(tr);
            });
        }

        window.openChatViewer = function(id) {
            const chat = allChats.find(c => c.chat_id === id);
            const body = document.getElementById('modal-chat-body');
            body.innerHTML = '';
            JSON.parse(chat.transcript).forEach(m => {
                const isFile = m.text.toLowerCase().includes("file") || m.text.toLowerCase().includes("sticker");
                const div = document.createElement('div');
                div.className = `p-3 rounded-lg ${m.type === 'agent' ? 'bubble-agent' : 'bubble-customer'} ${isFile ? 'bubble-file' : ''}`;
                div.innerHTML = isFile ? `<i class="fa-solid fa-paperclip mr-2"></i>${m.text}` : m.text;
                body.appendChild(div);
            });
            document.getElementById('chat-modal').classList.remove('hidden');
        }

        function exportCSV() {
            let csv = "ID,Cliente,Agente,Fecha\n" + allChats.map(c => `${c.chat_id},${c.customer_phone},${c.agent_name},${c.start_time}`).join("\n");
            const a = document.createElement('a');
            a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
            a.download = 'reporte_chats.csv';
            a.click();
        }

        document.getElementById('search-input').oninput = (e) => renderTable(allChats.filter(c => c.customer_phone.includes(e.target.value)));
        document.getElementById('btn-refresh').onclick = fetchChats;
        fetchChats();
    </script>
</body>
</html>
